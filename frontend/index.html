<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Corretor de Provas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #resultado, #historico {
            margin-top: 20px;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📋 Corretor de Provas</h2>

    <input type="text" id="nome" placeholder="Nome do aluno">
    <input type="text" id="gabarito" placeholder="Gabarito (ex: A,B,C,D)">
    <input type="file" id="file">

    <button onclick="corrigir()">Corrigir Prova</button>
    <button onclick="verHistorico()">Ver Histórico</button>

    <div id="resultado"></div>
    <div id="historico"></div>
</div>

<script>

const API_URL = "https://corretor-provas.onrender.com";

async function corrigir() {
    try {
        const nome = document.getElementById("nome").value;
        const gabarito = document.getElementById("gabarito").value;
        const file = document.getElementById("file").files[0];

        if (!nome || !gabarito || !file) {
            alert("Preencha todos os campos!");
            return;
        }

        // Criar prova
        const resProva = await fetch(`${API_URL}/criar-prova/?nome=${nome}&gabarito=${gabarito}`, {
            method: "POST"
        });

        if (!resProva.ok) throw new Error("Erro ao criar prova");

        const dataProva = await resProva.json();
        const prova_id = dataProva.prova_id;

        // Enviar imagem
        const formData = new FormData();
        formData.append("file", file);

        const resCorrigir = await fetch(`${API_URL}/corrigir/${prova_id}`, {
            method: "POST",
            body: formData
        });

        if (!resCorrigir.ok) throw new Error("Erro ao corrigir prova");

        const resultado = await resCorrigir.json();

        document.getElementById("resultado").innerHTML = `
            <h3>Resultado</h3>
            Nota: ${resultado.nota} / ${resultado.total}<br>
            Respostas: ${resultado.respostas_detectadas.join(", ")}
        `;

    } catch (error) {
        console.error(error);
        alert("Erro ao processar a prova. Veja o console.");
    }
}

async function verHistorico() {
    try {
        const res = await fetch(`${API_URL}/provas/`);

        if (!res.ok) throw new Error("Erro ao buscar histórico");

        const data = await res.json();

        let html = "<h3>Histórico</h3>";

        data.forEach(p => {
            html += `
                <p>
                <strong>${p.nome}</strong><br>
                Nota: ${p.nota}/${p.total}<br>
                Respostas: ${p.respostas}
                </p>
            `;
        });

        document.getElementById("historico").innerHTML = html;

    } catch (error) {
        console.error(error);
        alert("Erro ao carregar histórico.");
    }
}

</script>

</body>
</html>
